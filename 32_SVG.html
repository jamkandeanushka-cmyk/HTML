<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG</title>
</head>
<body>
    

<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#f5f5f5"/>

  <!-- Motu-inspired character -->
  <g transform="translate(170,40)">
    <circle cx="0" cy="50" r="40" fill="#ffd6b3" stroke="#333" stroke-width="2"/>
    <circle cx="-12" cy="45" r="4" fill="#000"/>
    <circle cx="12" cy="45" r="4" fill="#000"/>
    <path d="M-15 65 Q0 78 15 65" fill="none" stroke="#000" stroke-width="2"/>

    <ellipse cx="0" cy="145" rx="55" ry="65" fill="#ffcc33" stroke="#333" stroke-width="2"/>

    <line x1="-45" y1="130" x2="-80" y2="160" stroke="#333" stroke-width="6"/>
    <line x1="45" y1="130" x2="80" y2="160" stroke="#333" stroke-width="6"/>

    <line x1="-20" y1="205" x2="-20" y2="255" stroke="#333" stroke-width="8"/>
    <line x1="20" y1="205" x2="20" y2="255" stroke="#333" stroke-width="8"/>
  </g>

  <!-- Patlu-inspired character -->
  <g transform="translate(430,40)">
    <circle cx="0" cy="50" r="35" fill="#ffd6b3" stroke="#333" stroke-width="2"/>
    <circle cx="-10" cy="45" r="3.5" fill="#000"/>
    <circle cx="10" cy="45" r="3.5" fill="#000"/>
    <path d="M-12 62 Q0 72 12 62" fill="none" stroke="#000" stroke-width="2"/>

    <rect x="-25" y="85" width="50" height="110" rx="10"
          fill="#66ccff" stroke="#333" stroke-width="2"/>

    <line x1="-25" y1="110" x2="-60" y2="145" stroke="#333" stroke-width="5"/>
    <line x1="25" y1="110" x2="60" y2="145" stroke="#333" stroke-width="5"/>

    <line x1="-10" y1="195" x2="-10" y2="255" stroke="#333" stroke-width="6"/>
    <line x1="10" y1="195" x2="10" y2="255" stroke="#333" stroke-width="6"/>
  </g>

  <text x="145" y="290" font-size="22" fill="#333">Motu</text>
  <text x="410" y="290" font-size="22" fill="#333">Patlu</text>
</svg>
</body>
</html>
