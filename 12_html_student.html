<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Information Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 60%;
        }
        td {
            padding: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 5px;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Student Information Form</h2>

    <form>
        <table border="1">
            <tr>
                <td>Student Name</td>
                <td><input type="text" name="student_name"></td>
            </tr>

            <tr>
                <td>College Name</td>
                <td><input type="text" name="college_name"></td>
            </tr>

            <tr>
                <td>Roll Number</td>
                <td><input type="text" name="roll_no"></td>
            </tr>

            <tr>
                <td>Course</td>
                <td><input type="text" name="course"></td>
            </tr>

            <tr>
                <td>Semester</td>
                <td><input type="number" name="semester"></td>
            </tr>

            <tr>
                <td>Books Issued</td>
                <td>
                    <textarea name="books" rows="4"
                    placeholder="Enter book names"></textarea>
                </td>
            </tr>

            <tr>
                <td>Attendance (%)</td>
                <td><input type="number" name="attendance"></td>
            </tr>

            <tr>
                <td>Total Marks</td>
                <td><input type="number" name="total_marks"></td>
            </tr>

            <tr>
                <td>Obtained Marks</td>
                <td><input type="number" name="obtained_marks"></td>
            </tr>

            <tr>
                <td>Percentage</td>
                <td><input type="number" step="0.01" name="percentage"></td>
            </tr>

            <tr>
                <td>Address</td>
                <td><textarea name="address" rows="3"></textarea></td>
            </tr>

            <tr>
                <td>Mobile Number</td>
                <td><input type="tel" name="mobile"></td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input type="email" name="email"></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
