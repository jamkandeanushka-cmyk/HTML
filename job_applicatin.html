<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Form</title>
<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f6f9;
        margin:0;
        padding:20px;
    }
    .container{
        max-width:1000px;
        margin:auto;
        background:#fff;
        padding:25px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    h1,h2{
        text-align:center;
        color:#333;
    }
    fieldset{
        border:1px solid #ccc;
        margin-bottom:20px;
        padding:20px;
        border-radius:8px;
    }
    legend{
        font-weight:bold;
        color:#007bff;
        padding:0 10px;
    }
    .row{
        display:flex;
        flex-wrap:wrap;
        gap:15px;
    }
    .form-group{
        flex:1;
        min-width:250px;
        margin-bottom:15px;
    }
    label{
        display:block;
        margin-bottom:5px;
        font-weight:bold;
    }
    input, select, textarea{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
        box-sizing:border-box;
    }
    textarea{
        resize:vertical;
    }
    .gender-group{
        display:flex;
        gap:20px;
        align-items:center;
    }
    .gender-group label{
        font-weight:normal;
    }
    .btn-group{
        text-align:center;
        margin-top:20px;
    }
    button{
        padding:12px 25px;
        border:none;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
        margin:5px;
    }
    .submit-btn{
        background:#28a745;
        color:white;
    }
    .reset-btn{
        background:#dc3545;
        color:white;
    }
    button:hover{
        opacity:0.9;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Job Application Form</h1>

    <form action="#" method="post" enctype="multipart/form-data">

        <!-- Personal Details -->
        <fieldset>
            <legend>Personal Details</legend>

            <div class="row">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="full_name" required>
                </div>

                <div class="form-group">
                    <label>Father's Name *</label>
                    <input type="text" name="father_name" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Date of Birth *</label>
                    <input type="date" name="dob" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number *</label>
                    <input type="tel" name="mobile" required>
                </div>

                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" name="email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Gender *</label>
                <div class="gender-group">
                    <label><input type="radio" name="gender" value="Male" required> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                    <label><input type="radio" name="gender" value="Other"> Other</label>
                </div>
            </div>

            <div class="form-group">
                <label>Marital Status *</label>
                <select name="marital_status" required>
                    <option value="">Select</option>
                    <option>Single</option>
                    <option>Married</option>
                    <option>Divorced</option>
                    <option>Widowed</option>
                </select>
            </div>
        </fieldset>

        <!-- Educational Details -->
        <fieldset>
            <legend>Educational Details</legend>

            <div class="row">
                <div class="form-group">
                    <label>10th Percentage (%)</label>
                    <input type="number" step="0.01" name="tenth_percentage">
                </div>

                <div class="form-group">
                    <label>12th Percentage (%)</label>
                    <input type="number" step="0.01" name="twelfth_percentage">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Graduation Degree</label>
                    <input type="text" name="graduation">
                </div>

                <div class="form-group">
                    <label>University</label>
                    <input type="text" name="university">
                </div>

                <div class="form-group">
                    <label>Passing Year</label>
                    <input type="number" name="passing_year">
                </div>
            </div>

            <div class="form-group">
                <label>Additional Qualification</label>
                <textarea name="additional_qualification" rows="3"></textarea>
            </div>
        </fieldset>

        <!-- Experience Details -->
        <fieldset>
            <legend>Experience Details</legend>

            <div class="row">
                <div class="form-group">
                    <label>Total Experience (Years)</label>
                    <input type="number" step="0.1" name="total_experience">
                </div>

                <div class="form-group">
                    <label>Current Company</label>
                    <input type="text" name="current_company">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Designation</label>
                    <input type="text" name="designation">
                </div>

                <div class="form-group">
                    <label>Current Salary</label>
                    <input type="text" name="current_salary">
                </div>
            </div>

            <div class="form-group">
                <label>Skills</label>
                <textarea name="skills" rows="4"></textarea>
            </div>
        </fieldset>

        <!-- Address Details -->
        <fieldset>
            <legend>Address Details</legend>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" rows="3"></textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city">
                </div>

                <div class="form-group">
                    <label>PIN Code</label>
                    <input type="text" name="pin_code">
                </div>

                <div class="form-group">
                    <label>Country</label>
                    <input type="text" name="country">
                </div>
            </div>
        </fieldset>

        <!-- Photo & Signature -->
        <fieldset>
            <legend>Photo & Signature</legend>

            <div class="row">
                <div class="form-group">
                    <label>Upload Photo</label>
                    <input type="file" name="photo" accept="image/*">
                </div>

                <div class="form-group">
                    <label>Upload Signature</label>
                    <input type="file" name="signature" accept="image/*">
                </div>
            </div>
        </fieldset>

        <!-- Required Documents -->
        <fieldset>
            <legend>Required Documents</legend>

            <div class="row">
                <div class="form-group">
                    <label>Resume / CV</label>
                    <input type="file" name="resume" accept=".pdf,.doc,.docx">
                </div>

                <div class="form-group">
                    <label>Aadhaar Card</label>
                    <input type="file" name="aadhaar">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>PAN Card</label>
                    <input type="file" name="pan">
                </div>

                <div class="form-group">
                    <label>10th Marksheet</label>
                    <input type="file" name="marksheet10">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>12th Marksheet</label>
                    <input type="file" name="marksheet12">
                </div>

                <div class="form-group">
                    <label>Graduation Certificate</label>
                    <input type="file" name="graduation_certificate">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Experience Certificate</label>
                    <input type="file" name="experience_certificate">
                </div>

                <div class="form-group">
                    <label>Other Documents</label>
                    <input type="file" name="other_documents" multiple>
                </div>
            </div>
        </fieldset>

        <!-- Declaration -->
        <fieldset>
            <legend>Declaration</legend>

            <p>
                I hereby declare that all information provided by me is true and correct
                to the best of my knowledge and belief.
            </p>

            <label>
                <input type="checkbox" required>
                I agree to the above declaration.
            </label>
        </fieldset>

        <!-- Buttons -->
        <div class="btn-group">
            <button type="submit" class="submit-btn">
                Submit Application
            </button>

            <button type="reset" class="reset-btn">
                Reset Form
            </button>
        </div>

    </form>
</div>

</body>
</html>
