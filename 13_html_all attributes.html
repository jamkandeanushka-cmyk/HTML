<!DOCTYPE html>
<html>
<head>
    <title>Student Information</title>
</head>
<body style="background-color:lightyellow;">

    <h1 id="heading"
        class="title"
        title="Student Details"
        style="color:blue; text-align:center;">
        Student Information
    </h1>

    <!-- Student Photo -->
    <img id="photo"
         class="student-img"
         src="student.jpg"
         alt="Student Photo"
         title="Student Image"
         style="width:150px; height:150px; border:2px solid black;">

    <br><br>

    <!-- Student Name -->
    <label>Name:</label>
    <input id="name"
           class="input-box"
           type="text"
           placeholder="Enter Student Name"
           value="Rahul Sharma">

    <br><br>

    <!-- College Name -->
    <label>College:</label>
    <input id="college"
           class="input-box"
           type="text"
           placeholder="Enter College Name"
           value="ABC College">

    <br><br>

    <!-- Roll Number -->
    <label>Roll No:</label>
    <input id="rollno"
           class="input-box"
           type="text"
           placeholder="Enter Roll Number"
           value="101">

    <br><br>

    <!-- Books -->
    <label>Books:</label>
    <input id="books"
           class="input-box"
           type="text"
           placeholder="Enter Book Names"
           value="HTML, CSS, Java">

    <br><br>

    <!-- Attendance -->
    <label>Attendance:</label>
    <input id="attendance"
           class="input-box"
           type="text"
           placeholder="Attendance %"
           value="90%">

    <br><br>

    <!-- Marks -->
    <label>Marks:</label>
    <input id="marks"
           class="input-box"
           type="text"
           placeholder="Enter Marks"
           value="450">

    <br><br>

    <!-- Percentage -->
    <label>Percentage:</label>
    <input id="percentage"
           class="input-box"
           type="text"
           placeholder="Enter Percentage"
           value="90%">

    <br><br>

    <!-- Disabled Field -->
    <label>Status:</label>
    <input id="status"
           class="input-box"
           type="text"
           value="Verified"
           disabled>

    <br><br>

    <!-- College Website -->
    <a id="website"
       class="link"
       href="https://www.example.com"
       title="Visit College Website"
       style="color:red;">
       Visit College Website
    </a>

</body>
</html>
