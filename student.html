<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Marksheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .marksheet {
            width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border: 2px solid #000;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #ddd;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="marksheet">
    <h1>10th Standard Marksheet</h1>

    <p><strong>Student Name:</strong> _Surywanshi Anushka Rahul___________</p>

    <table>
        <tr>
            <th>Subject</th>
            <th>Marks Obtained</th>
            <th>Total Marks</th>
        </tr>
        <tr>
            <td>Science</td>
            <td>89</td>
            <td>100</td>
        </tr>
        <tr>
            <td>English</td>
            <td>90</td>
            <td>100</td>
        </tr>
        <tr>
            <td>History</td>
            <td>88</td>
            <td>100</td>
        </tr>
        <tr>
            <td>Marathi</td>
            <td>99</td>
            <td>100</td>
        </tr>
        <tr>
            <td>Math Part 1</td>
            <td>91</td>
            <td>100</td>
        </tr>
        <tr>
            <td>Math Part 2</td>
            <td>90</td>
            <td>100</td>
        </tr>
    </table>

    <div class="result">
        Total Marks: 547 / 600 <br>
        Percentage: 91.17%
    </div>
</div>

</body>
</html>
