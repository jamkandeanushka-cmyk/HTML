<!DOCTYPE html> 
<html>
 <head> Description for accessibility Enables fullscreen mode 
    <title>Audio, Video and Iframe Example</title> 
</head>
 <body>
    <h1>HTML Multimedia Elements</h1>
     <h2>Audio</h2> <audio controls>
         <source src="music.mp3" type="audio/mpeg"> 
        </audio>
         <h2>Video</h2>
          <video width="500" controls> 
            <source src="movie.mp4" type="video/mp4"> 
        </video>
         <h2>Iframe</h2>
          <iframe src="https://www.wikipedia.org" width="500" height="300">
             </iframe> 
            </body>
             </html>
